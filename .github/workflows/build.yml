# ============================================================
# .github/workflows/build.yml
# Builds WLED Word Clock firmware for ESP32-C3 and ESP8266.
#
# How it works:
#   1. Clones the official WLED source at a pinned stable tag
#   2. Injects our usermod files into the WLED source tree
#   3. Applies platformio_override.ini to extend WLED's build envs
#   4. Builds using WLED's own PlatformIO configuration
#
# To target a different WLED release, change WLED_TAG below.
# ============================================================
name: Build Firmware

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

env:
  WLED_TAG: "0.14.4"   # change to target a different WLED release

jobs:
  build:
    name: Build – ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: wordclock_esp32c3
            artifact: wordclock-esp32c3
          - env: wordclock_esp8266
            artifact: wordclock-esp8266

    steps:
      - name: Checkout Word Clock repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone WLED ${{ env.WLED_TAG }}
        run: |
          git clone --depth 1 --branch ${{ env.WLED_TAG }} \
            https://github.com/Aircoookie/WLED.git wled-src
          echo "WLED cloned at tag ${{ env.WLED_TAG }}"

      - name: Inject Word Clock files into WLED source tree
        run: |
          # Usermod source
          cp -r usermods/WordClock wled-src/usermods/

          # Register the usermod with WLED
          cp wled00/usermods_list.cpp wled-src/wled00/usermods_list.cpp

          # Add our usermod ID to WLED's const.h
          {
            echo ''
            echo '// === Word Clock Usermod ==='
            echo '#ifndef USERMOD_ID_WORDCLOCK'
            echo '#define USERMOD_ID_WORDCLOCK 99'
            echo '#endif'
          } >> wled-src/wled00/const.h

          echo "Injected files — usermod:"
          ls wled-src/usermods/WordClock/
          echo "Last lines of const.h:"
          tail -6 wled-src/wled00/const.h

      - name: Install platformio_override.ini
        run: |
          cp platformio_override.ini wled-src/platformio_override.ini

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-wled-${{ env.WLED_TAG }}-${{ matrix.env }}-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            pio-wled-${{ env.WLED_TAG }}-${{ matrix.env }}-
            pio-wled-${{ env.WLED_TAG }}-

      - name: Build ${{ matrix.env }}
        working-directory: wled-src
        run: pio run --environment ${{ matrix.env }}

      - name: Find firmware binary
        id: find_bin
        working-directory: wled-src
        run: |
          BIN=$(find .pio/build/${{ matrix.env }} -maxdepth 1 -name "*.bin" | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: No .bin found in .pio/build/${{ matrix.env }}"
            ls .pio/build/${{ matrix.env }}/ || true
            exit 1
          fi
          echo "bin_path=$BIN" >> "$GITHUB_OUTPUT"
          echo "Found: $BIN"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wled-src/${{ steps.find_bin.outputs.bin_path }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')

    steps:
      - name: Download ESP32-C3 firmware
        uses: actions/download-artifact@v4
        with:
          name: wordclock-esp32c3
          path: release/

      - name: Download ESP8266 firmware
        uses: actions/download-artifact@v4
        with:
          name: wordclock-esp8266
          path: release/

      - name: Get tag / version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Word Clock Firmware ${{ steps.version.outputs.tag }}"
          draft:      false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ## WLED Word Clock Firmware
            Built on WLED base ${{ env.WLED_TAG }}

            ### Flash via WLED Web Installer (easiest)
            1. Go to https://install.wled.me
            2. Connect your board via USB
            3. Choose **Upload your own firmware** and select the `.bin` for your board

            | File | Target board |
            |------|-------------|
            | `wordclock-esp32c3-*.bin` | ESP32-C3 (SuperMini, XIAO) |
            | `wordclock-esp8266-*.bin` | ESP8266 (Wemos D1 Mini, NodeMCU v2) |

            ### After flashing
            1. Connect to the **WLED-AP** hotspot and enter your WiFi password
            2. Open `http://wled.local` → **Config → LED Preferences** → LED count = **114**
            3. **Config → Time & Macros** → enable NTP, set your UTC offset
            4. **Config → Usermods → wc** → configure word clock options
          files: release/*.bin
