; ============================================================
; platformio.ini  —  LOCAL REFERENCE ONLY
; ============================================================
; This file is NOT used by the GitHub Actions CI build.
;
; The CI workflow (build.yml):
;   1. Clones the full WLED source tree
;   2. Injects our files into it
;   3. Uses platformio_override.ini (see that file) to extend
;      WLED's own build environments
;
; To build/flash locally with VS Code + PlatformIO:
;   1. Clone WLED:  git clone https://github.com/Aircoookie/WLED.git
;   2. Copy usermods/WordClock/  into  WLED/usermods/
;   3. Copy wled00/usermods_list.cpp  into  WLED/wled00/
;   4. Copy platformio_override.ini  into  WLED/
;   5. Add  #define USERMOD_ID_WORDCLOCK 99  to WLED/wled00/const.h
;   6. Open the WLED folder in VS Code and build env wordclock_esp32c3
;      or wordclock_esp8266
; ============================================================
