; ============================================================
; WLED Word Clock – PlatformIO build configuration
; ============================================================
; Based on WLED's own platformio.ini, extended with Word Clock
; usermod flag and two target environments:
;   • esp32-c3  (esp32c3dev)
;   • esp8266   (d1_mini / nodemcuv2)
;
; Usage:
;   pio run -e esp32c3  -t upload    # flash ESP32-C3
;   pio run -e esp8266  -t upload    # flash ESP8266
;   pio run             -t buildfs   # build filesystems (optional)
; ============================================================

[platformio]
default_envs = esp32c3, esp8266

; ── Shared settings ──────────────────────────────────────────────────────────
[common]
framework       = arduino
monitor_speed   = 115200
upload_speed    = 460800
lib_deps        =
  fastled/FastLED @ ^3.6.0
  bblanchon/ArduinoJson @ ^6.21.5
  https://github.com/Aircoookie/WLED.git
build_flags_common =
  -D USERMOD_ID_WORDCLOCK=99
  -D WLED_USE_MY_CONFIG
  -D WLED_ENABLE_MQTT=1
  ; Adjust LED count to match your physical strip (114 = 4 dots + 110 matrix)
  -D LEDCOUNT=114

; ── ESP32-C3 ─────────────────────────────────────────────────────────────────
[env:esp32c3]
platform        = espressif32 @ ^6.4.0
board           = esp32-c3-devkitm-1
framework       = ${common.framework}
monitor_speed   = ${common.monitor_speed}
upload_speed    = ${common.upload_speed}
lib_deps        = ${common.lib_deps}
build_flags     =
  ${common.build_flags_common}
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  ; ESP32-C3 has only one core – disable multi-core tasks
  -D CONFIG_FREERTOS_UNICORE=1
  ; WLED's LED data pin – change to match your wiring
  -D DATA_PIN=8
  ; Optional: second pin for white channel (RGBW strips)
  ; -D DATA_PIN2=9
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
monitor_filters         = esp32_exception_decoder
extra_scripts           = pre:pio-scripts/set_version.py

; ── ESP8266 ──────────────────────────────────────────────────────────────────
[env:esp8266]
platform        = espressif8266 @ ^4.2.1
board           = d1_mini
; Use 'd1_mini_pro' if you have the Pro variant with 16 MB flash
; board         = d1_mini_pro
framework       = ${common.framework}
monitor_speed   = ${common.monitor_speed}
upload_speed    = ${common.upload_speed}
lib_deps        = ${common.lib_deps}
build_flags     =
  ${common.build_flags_common}
  -D DATA_PIN=2          ; GPIO2 / D4 on D1 Mini
  -D WLED_USE_ETHERNET=0 ; ESP8266 is WiFi-only
  -DVTABLES_IN_FLASH
  -DBEARSSL_SSL_BASIC
board_build.filesystem = littlefs
board_build.ldscript   = eagle.flash.4m2m.ld
; 4 MB flash, 2 MB SPIFFS/LittleFS

; ── OTA update environment (shared) ──────────────────────────────────────────
[env:esp32c3_ota]
extends         = env:esp32c3
upload_protocol = espota
upload_port     = wordclock.local   ; mDNS hostname of your device
upload_flags    =
  --port=3232
  --auth=wled1234          ; match your WLED OTA password

[env:esp8266_ota]
extends         = env:esp8266
upload_protocol = espota
upload_port     = wordclock.local
upload_flags    =
  --port=8266
  --auth=wled1234
