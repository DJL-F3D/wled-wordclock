; ============================================================
; platformio_override.ini
; Word Clock additions to WLED's standard build environments.
;
; This file is copied into the root of the cloned WLED source
; tree by the GitHub Actions workflow.  WLED's own platformio.ini
; includes it automatically via:
;   [platformio]
;   extra_configs = platformio_override.ini
;
; We define two NEW environment names that extend WLED's
; existing esp32c3dev / d1_mini envs so that WLED's own
; settings are inherited and we only add what we need.
;
; DATA_PIN — change to match your wiring:
;   ESP32-C3:  GPIO 8  (default on SuperMini / XIAO boards)
;   ESP8266:   GPIO 2  (= D4 on Wemos D1 Mini)
; ============================================================

; ── ESP32-C3 ─────────────────────────────────────────────────────────────────
[env:wordclock_esp32c3]
extends         = env:esp32c3dev
build_flags     = ${env:esp32c3dev.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PIN=8

; ── ESP8266 (Wemos D1 Mini / NodeMCU v2) ─────────────────────────────────────
[env:wordclock_esp8266]
extends         = env:d1_mini
build_flags     = ${env:d1_mini.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PIN=2
