; ============================================================
; platformio_override.ini — Word Clock custom build environments
;
; This file is copied into the WLED source root by build.yml.
; WLED picks it up automatically alongside its own platformio.ini.
;
; DATA_PINS — change the number to match your wiring:
;   ESP32-C3 SuperMini default : 8  (GPIO8)
;   ESP8266  D1 Mini   default : 2  (GPIO2 = D4)
; ============================================================

[platformio]
default_envs = wordclock_esp32c3, wordclock_esp8266

; ── ESP32-C3 SuperMini ───────────────────────────────────────────────────────
;
; Three issues specific to the SuperMini vs the generic esp32-c3-devkitm-1:
;
; 1. FLASH MODE — SuperMini uses DIO, not QIO.
;    The devkitm-1 board profile defaults to QIO.  With the wrong flash mode
;    the ESP32-C3 ROM silently fails to load the bootloader and the chip
;    never reaches the application.  No AP, no serial output, nothing.
;    Fix: board = lolin_c3_mini  (this profile ships with flash_mode = dio)
;    and we also set board_build.flash_mode explicitly as a belt-and-braces.
;
; 2. USB CDC ON BOOT — SuperMini has native USB, not a bridge chip.
;    WLED's base esp32c3 env sets ARDUINO_USB_CDC_ON_BOOT=1, which makes
;    the firmware wait for a USB serial host before continuing boot.
;    Running standalone (e.g. powered from a USB charger) no host
;    enumerates, the watchdog fires, and the board reboots in a loop.
;    Fix: unflag =1 and replace with =0 so boot is unconditional.
;
; 3. USB MODE — must be JTAG/Serial (1), not native CDC (0), to match
;    how the SuperMini's USB hardware is wired.
;
[env:wordclock_esp32c3]
extends                  = esp32c3
platform                 = ${esp32c3.platform}
platform_packages        = ${esp32c3.platform_packages}
board                    = lolin_c3_mini
board_build.flash_mode   = dio
board_build.partitions   = min_spiffs.csv
build_unflags            = ${common.build_unflags}
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_flags              = ${common.build_flags} ${esp32c3.build_flags}
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=1
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=8

; ── ESP8266 (Wemos D1 Mini / NodeMCU v2) ─────────────────────────────────────
[env:wordclock_esp8266]
board                    = d1_mini
platform                 = ${common.platform_wled_default}
platform_packages        = ${common.platform_packages}
board_build.ldscript     = ${common.ldscript_4m1m}
build_unflags            = ${common.build_unflags}
build_flags              = ${common.build_flags} ${esp8266.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=2
lib_deps                 = ${esp8266.lib_deps}
